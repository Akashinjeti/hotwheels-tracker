name: HotWheels Restock Checker

on:
  schedule:
    - cron: '*/15 * * * *'  # Every 15 minutes, 24/7
  workflow_dispatch:          # Manual trigger anytime

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write         # needed to commit state file back

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run HotWheels checker
        env:
          SMTP_EMAIL: ${{ secrets.SMTP_EMAIL }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        run: python checker.py

      - name: Save state back to repo
        run: |
          git config user.name "HotWheels Bot"
          git config user.email "bot@hotwheels-tracker.com"
          git add last_state.json
          git diff --staged --quiet || git commit -m "Update stock state [skip ci]"
          git push